unknownRequestSnippets:
  - zákazník zároveň žádá o vystavení duplikátu staré faktury
  - součástí zprávy je i požadavek na reklamaci posledního vyúčtování
  - v závěru je navíc prosba o výměnu poškozené SIM karty
  - součástí hovoru je také technická reklamace Wi-Fi výpadků

