version: '4.0'
artifact_role:
  primary_uses:
  - Gold reference outputs pro generování vstupů pro extrakční službu s jasně daným request type.
  - Gold klasifikační scénáře pro generování vstupů, kde request type není předem znám a musí být nejprve určen.
  - Zdroj ground-truth metadat pro následnou zpětnou kontrolu vygenerovaných vstupů.
  not_modeled_here:
  - Prompty a runtime instrukce pro extrakční nebo klasifikační službu.
  - Samotná business validace nad pravidly; ta zůstává v rules.yaml.
  - Char-offset anotace; observability metadata mají být založena na evidence snippets.
compatibility:
  request_types_source: request_types_v3.yaml
  classifier_outcomes_source: classifier_outcomes_v3.yaml
  domain_rules_source: rules_v2.yaml
