version: 1.2-synthetic-safe-camelCase

notes:
  - Tyto pooly slouží ke generování konkrétních instancí nad strukturou request types.
  - Jména, telefony a adresy se mají losovat při generování a propsat jak do inputText, tak do expectedExtractions.
  - Kontaktní údaje jsou záměrně syntetické: e-maily používají doménu example.com a telefonní čísla mají deset číslic.
  - Adresy jsou záměrně fiktivní a nejsou určeny k reprezentaci reálných zákaznických adres.

