version: 4.0-lean-camelCase
purpose:
- Zdrojová definice request types pro generování syntetických benchmark vstupů.
- Zdrojová definice DTO tvarů pro budoucí mapování gold dat přímo do Java objektů.
componentTypes:
  serviceSelection:
    javaClassName: ServiceSelectionDto
    fields:
    - path: serviceId
      javaType: String
      meaning: Interní ID zvoleného katalogového servisu.
    - path: quantity
      javaType: Integer
      meaning: Počet kusů nebo linek pro danou službu.
  productSelection:
    javaClassName: ProductSelectionDto
    fields:
    - path: productId
      javaType: String
      meaning: Interní ID zvoleného katalogového produktu nebo add-onu.
    - path: quantity
      javaType: Integer
      meaning: Počet kusů produktu.
  discountSelection:
    javaClassName: DiscountSelectionDto
    fields:
    - path: discountId
      javaType: String
      meaning: Interní ID explicitně uvedené slevy.
  portedNumber:
    javaClassName: PortedNumberDto
    fields:
    - path: number
      javaType: String
      meaning: Přenášené telefonní číslo.
    - path: donorOperator
      javaType: String
      meaning: Původní operátor přenášeného čísla.
  mobileLine:
    javaClassName: MobileLineDto
    fields:
    - path: label
      javaType: String
      meaning: Lidsky čitelný popis konkrétní linky v rodinném tarifu.
    - path: planServiceId
      javaType: String
      meaning: ID tarifu přiřazeného dané lince.
    - path: portingRequested
      javaType: Boolean
      meaning: Zda se pro tuto linku požaduje přenos čísla.
  currentServiceRef:
    javaClassName: CurrentServiceRefDto
    fields:
    - path: serviceId
      javaType: String
      meaning: ID aktuálně využívané služby ve retenčním požadavku.
requestTypes:
- requestTypeId: rt_new_mobile_order
  dtoClassName: SingleMobileOrderRequestDto
  promptDirectory: read_prompts/extraction/rt_new_mobile_order
  title: Objednávka samostatné mobilní služby
  description: Objednávka jedné mobilní služby pro nového nebo stávajícího zákazníka,
    volitelně s přenosem čísla.
  fields:
  - path: customerStatus
    javaType: CustomerStatus
    meaning: Status zákazníka vůči operátorovi.
    requiredForComplete: true
    allowedValues: &id001
    - new
    - existing
  - path: customerName
    javaType: String
    meaning: Jméno a příjmení zákazníka nebo kontaktní osoby.
    requiredForComplete: true
  - path: contactPhone
    javaType: String
    meaning: Primární kontaktní telefon pro zpracování požadavku.
    requiredForComplete: true
  - path: contactEmail
    javaType: String
    meaning: Kontaktní e-mail, pokud je ve vstupu uveden.
    requiredForComplete: false
  - path: requestedServices
    javaType: List<ServiceSelectionDto>
    meaning: Hlavní služby, které zákazník požaduje objednat.
    requiredForComplete: true
    componentType: serviceSelection
  - path: contractTermMonths
    javaType: Integer
    meaning: Požadovaná délka závazku v měsících.
    requiredForComplete: true
    allowedValues: &id002
    - 0
    - 24
  - path: portingRequested
    javaType: Boolean
    meaning: Indikátor, že zákazník požaduje přenos čísla od jiného operátora.
    requiredForComplete: true
  - path: portedNumbers
    javaType: List<PortedNumberDto>
    meaning: Seznam čísel určených k portaci.
    requiredForComplete: false
    componentType: portedNumber
  - path: requestedDiscounts
    javaType: List<DiscountSelectionDto>
    meaning: Slevy explicitně požadované nebo zmíněné ve vstupu.
    requiredForComplete: false
    componentType: discountSelection
  completeRequiredFields:
  - customerStatus
  - customerName
  - contactPhone
  - requestedServices
  - contractTermMonths
  - portingRequested
  conditionalRequiredFields:
  - when: portingRequested == true
    fieldPaths:
    - portedNumbers
  fieldConstraints:
  - path: requestedServices.serviceId
    allowedServiceIds:
    - svc_mobile_start_5g
    - svc_mobile_unlimited_5g
  - path: requestedDiscounts.discountId
    allowedDiscountIds:
    - disc_porting_mobile_200
  - path: requestedServices
    minItems: 1
    maxItems: 1
  - path: portedNumbers
    minItems: 0
  - path: requestedDiscounts
    minItems: 0
    maxItems: 1
  scenarioTemplates:
  - templateId: start_no_porting
    description: Jedna nová mobilní služba bez přenosu čísla.
    fixedValues:
      requestedServices:
      - serviceId: svc_mobile_start_5g
        quantity: 1
      contractTermMonths: 24
      portingRequested: false
      requestedDiscounts: []
  - templateId: unlimited_with_porting
    description: Jedna prémiová mobilní služba s přenosem čísla a porting slevou.
    fixedValues:
      requestedServices:
      - serviceId: svc_mobile_unlimited_5g
        quantity: 1
      contractTermMonths: 24
      portingRequested: true
      requestedDiscounts:
      - discountId: disc_porting_mobile_200
  generationSources:
    customerName: entityPools.customerProfiles.customerName
    contactPhone: entityPools.customerProfiles.contactPhone
    contactEmail: entityPools.customerProfiles.contactEmail
    portedNumbers: entityPools.portedNumbers
- requestTypeId: rt_family_mobile_order
  dtoClassName: FamilyMobileOrderRequestDto
  promptDirectory: read_prompts/extraction/rt_family_mobile_order
  title: Rodinná mobilní objednávka
  description: Objednávka rodinného mobilního tarifu s více linkami v rámci jednoho
    požadavku.
  fields:
  - path: customerStatus
    javaType: CustomerStatus
    meaning: Status zákazníka vůči operátorovi.
    requiredForComplete: true
    allowedValues: *id001
  - path: customerName
    javaType: String
    meaning: Jméno a příjmení zákazníka nebo kontaktní osoby.
    requiredForComplete: true
  - path: contactPhone
    javaType: String
    meaning: Primární kontaktní telefon pro zpracování požadavku.
    requiredForComplete: true
  - path: contactEmail
    javaType: String
    meaning: Kontaktní e-mail, pokud je ve vstupu uveden.
    requiredForComplete: false
  - path: requestedServices
    javaType: List<ServiceSelectionDto>
    meaning: Hlavní služby, které zákazník požaduje objednat.
    requiredForComplete: true
    componentType: serviceSelection
  - path: mobileLinesCount
    javaType: Integer
    meaning: Počet mobilních linek v rodinné mobilní objednávce.
    requiredForComplete: true
  - path: mobileLines
    javaType: List<MobileLineDto>
    meaning: Detail jednotlivých linek v rodinné mobilní objednávce.
    requiredForComplete: true
    componentType: mobileLine
  - path: portedNumbers
    javaType: List<PortedNumberDto>
    meaning: Seznam čísel určených k portaci.
    requiredForComplete: false
    componentType: portedNumber
  - path: contractTermMonths
    javaType: Integer
    meaning: Požadovaná délka závazku v měsících.
    requiredForComplete: true
    allowedValues: *id002
  - path: requestedDiscounts
    javaType: List<DiscountSelectionDto>
    meaning: Slevy explicitně požadované nebo zmíněné ve vstupu.
    requiredForComplete: false
    componentType: discountSelection
  completeRequiredFields:
  - customerStatus
  - customerName
  - contactPhone
  - requestedServices
  - mobileLinesCount
  - mobileLines
  - contractTermMonths
  conditionalRequiredFields:
  - when: any mobileLines[].portingRequested == true
    fieldPaths:
    - portedNumbers
  fieldConstraints:
  - path: requestedServices.serviceId
    allowedServiceIds:
    - svc_mobile_family_plus
  - path: mobileLines.planServiceId
    allowedServiceIds:
    - svc_mobile_family_plus
  - path: requestedDiscounts.discountId
    allowedDiscountIds:
    - disc_family_line_100
    - disc_porting_mobile_200
  - path: requestedServices
    minItems: 1
    maxItems: 1
  - path: mobileLines
    minItems: 1
  - path: portedNumbers
    minItems: 0
  - path: requestedDiscounts
    minItems: 0
    maxItems: 2
  scenarioTemplates:
  - templateId: family_two_lines
    description: Rodinný tarif pro dvě linky bez přenosu čísel.
    fixedValues:
      requestedServices:
      - serviceId: svc_mobile_family_plus
        quantity: 2
      mobileLinesCount: 2
      mobileLines:
      - label: hlavní linka
        planServiceId: svc_mobile_family_plus
        portingRequested: false
      - label: druhá linka
        planServiceId: svc_mobile_family_plus
        portingRequested: false
      contractTermMonths: 24
      requestedDiscounts:
      - discountId: disc_family_line_100
  - templateId: family_three_lines_porting
    description: Rodinný tarif pro tři linky, dvě z nich s přenosem čísla.
    fixedValues:
      requestedServices:
      - serviceId: svc_mobile_family_plus
        quantity: 3
      mobileLinesCount: 3
      mobileLines:
      - label: hlavní linka
        planServiceId: svc_mobile_family_plus
        portingRequested: true
      - label: druhá linka
        planServiceId: svc_mobile_family_plus
        portingRequested: true
      - label: třetí linka
        planServiceId: svc_mobile_family_plus
        portingRequested: false
      contractTermMonths: 24
      requestedDiscounts:
      - discountId: disc_family_line_100
      - discountId: disc_porting_mobile_200
  generationSources:
    customerName: entityPools.customerProfiles.customerName
    contactPhone: entityPools.customerProfiles.contactPhone
    contactEmail: entityPools.customerProfiles.contactEmail
    portedNumbers: entityPools.portedNumbers
