version: 3.1-camelCase
artifactRole:
  primaryUses:
  - Zdrojová definice request types pro generování syntetických vstupů.
  - Zdrojová definice DTO struktur pro extrakci dat do Java objektů.
  notModeledHere:
  - Prompty, instrukce a runtime chování extrakční služby.
  - Business validace proti doménovým pravidlům v rules.yaml.
  - Speciální klasifikační výstupy typu unknown_or_out_of_scope nebo multi_intent.
sharedFieldCatalog:
  customerStatus:
    javaType: CustomerStatus
    valueKind: enum
    allowedValues:
    - new
    - existing
    description: Status zákazníka vůči operátorovi.
  customerName:
    javaType: String
    valueKind: string
    description: Jméno a příjmení zákazníka nebo kontaktní osoby.
  contactPhone:
    javaType: String
    valueKind: string
    format: czech_phone_number
    description: Primární kontaktní telefon pro zpracování požadavku.
  contactEmail:
    javaType: String
    valueKind: string
    format: email
    description: Kontaktní e-mail, pokud je ve vstupu uveden.
  installationAddress:
    javaType: String
    valueKind: string
    description: Instalační adresa pro pevný internet nebo domácí služby.
  requestedServices:
    javaType: List<ServiceSelectionDto>
    valueKind: array
    itemComponentRef: serviceSelection
    description: Hlavní služby, které zákazník požaduje objednat.
  requestedProducts:
    javaType: List<ProductSelectionDto>
    valueKind: array
    itemComponentRef: productSelection
    description: Doplňkové produkty nebo add-ony uvedené v požadavku.
  requestedDiscounts:
    javaType: List<DiscountSelectionDto>
    valueKind: array
    itemComponentRef: discountSelection
    description: Slevy explicitně požadované nebo zmíněné ve vstupu.
  contractTermMonths:
    javaType: Integer
    valueKind: integer
    allowedValues:
    - 0
    - 24
    description: Požadovaná délka závazku v měsících.
  portingRequested:
    javaType: Boolean
    valueKind: boolean
    description: Indikátor, že zákazník požaduje přenos čísla od jiného operátora.
  portedNumbers:
    javaType: List<PortedNumberDto>
    valueKind: array
    itemComponentRef: portedNumber
    description: Seznam čísel určených k portaci.
  mobileLinesCount:
    javaType: Integer
    valueKind: integer
    minimum: 1
    description: Počet mobilních linek v rodinné mobilní objednávce.
  mobileLines:
    javaType: List<MobileLineDto>
    valueKind: array
    itemComponentRef: mobileLine
    description: Detail jednotlivých linek v rodinné mobilní objednávce.
  retentionCase:
    javaType: Boolean
    valueKind: boolean
    description: Indikátor, že jde o retenční jednání.
  currentServices:
    javaType: List<CurrentServiceRefDto>
    valueKind: array
    itemComponentRef: currentServiceRef
    description: Služby, které zákazník aktuálně využívá.
  targetServiceId:
    javaType: String
    valueKind: domain_ref
    domain: serviceId
    description: Služba, ke které se retenční požadavek vztahuje.
  churnReason:
    javaType: String
    valueKind: string
    description: Důvod zvažovaného odchodu nebo žádosti o lepší podmínky.
  competitorOffer:
    javaType: String
    valueKind: string
    description: Konkurenční nabídka zmíněná v retenčním kontextu.
sharedComponentCatalog:
  serviceSelection:
    javaClassName: ServiceSelectionDto
    description: Jedna požadovaná hlavní služba a její množství.
    fields:
    - name: serviceId
      javaType: String
      valueKind: domain_ref
      domain: serviceId
      required: true
    - name: quantity
      javaType: Integer
      valueKind: integer
      minimum: 1
      required: true
  productSelection:
    javaClassName: ProductSelectionDto
    description: Jeden požadovaný doplňkový produkt a jeho množství.
    fields:
    - name: productId
      javaType: String
      valueKind: domain_ref
      domain: productId
      required: true
    - name: quantity
      javaType: Integer
      valueKind: integer
      minimum: 1
      required: true
  discountSelection:
    javaClassName: DiscountSelectionDto
    description: Jedna sleva explicitně uvedená v požadavku.
    fields:
    - name: discountId
      javaType: String
      valueKind: domain_ref
      domain: discountId
      required: true
  portedNumber:
    javaClassName: PortedNumberDto
    description: Jedno portované číslo a donor operátor.
    fields:
    - name: number
      javaType: String
      valueKind: string
      format: czech_phone_number
      required: true
    - name: donorOperator
      javaType: String
      valueKind: string
      required: true
  mobileLine:
    javaClassName: MobileLineDto
    description: Jedna linka v rodinné mobilní objednávce.
    fields:
    - name: label
      javaType: String
      valueKind: string
      required: true
    - name: planServiceId
      javaType: String
      valueKind: domain_ref
      domain: serviceId
      required: true
    - name: portingRequested
      javaType: Boolean
      valueKind: boolean
      required: true
  currentServiceRef:
    javaClassName: CurrentServiceRefDto
    description: Odkaz na aktuálně využívanou službu v retenčním požadavku.
    fields:
    - name: serviceId
      javaType: String
      valueKind: domain_ref
      domain: serviceId
      required: true
requestTypes:
- requestTypeId: rt_new_mobile_order
  canonicalName: single_mobile_order
  title: Objednávka samostatné mobilní služby
  description: Objednávka jedné mobilní služby pro nového nebo stávajícího zákazníka, volitelně s přenosem čísla.
  dto:
    rootClassName: SingleMobileOrderRequestDto
    fields:
    - customerStatus
    - customerName
    - contactPhone
    - contactEmail
    - requestedServices
    - contractTermMonths
    - portingRequested
    - portedNumbers
    - requestedDiscounts
  completeness:
    requiredFields:
    - customerStatus
    - customerName
    - contactPhone
    - requestedServices
    - contractTermMonths
    - portingRequested
    conditionalRequiredFields:
    - when: portingRequested == true
      requiredFields:
      - portedNumbers
  fieldDomainScope:
    requestedServices.serviceId:
      allowedServiceIds:
      - svc_mobile_start_5g
      - svc_mobile_unlimited_5g
    requestedDiscounts.discountId:
      allowedDiscountIds:
      - disc_porting_mobile_200
  collectionFieldConstraints:
    requestedServices:
      minItems: 1
      maxItems: 1
    portedNumbers:
      minItems: 0
    requestedDiscounts:
      minItems: 0
      maxItems: 1
- requestTypeId: rt_family_mobile_order
  canonicalName: family_mobile_order
  title: Rodinná mobilní objednávka
  description: Objednávka rodinného mobilního tarifu s více linkami v rámci jednoho požadavku.
  dto:
    rootClassName: FamilyMobileOrderRequestDto
    fields:
    - customerStatus
    - customerName
    - contactPhone
    - contactEmail
    - requestedServices
    - mobileLinesCount
    - mobileLines
    - portedNumbers
    - contractTermMonths
    - requestedDiscounts
  completeness:
    requiredFields:
    - customerStatus
    - customerName
    - contactPhone
    - requestedServices
    - mobileLinesCount
    - mobileLines
    - contractTermMonths
    conditionalRequiredFields:
    - when: any mobileLines[].portingRequested == true
      requiredFields:
      - portedNumbers
  fieldDomainScope:
    requestedServices.serviceId:
      allowedServiceIds:
      - svc_mobile_family_plus
    mobileLines.planServiceId:
      allowedServiceIds:
      - svc_mobile_family_plus
    requestedDiscounts.discountId:
      allowedDiscountIds:
      - disc_family_line_100
      - disc_porting_mobile_200
  collectionFieldConstraints:
    requestedServices:
      minItems: 1
      maxItems: 1
    mobileLines:
      minItems: 1
    portedNumbers:
      minItems: 0
    requestedDiscounts:
      minItems: 0
      maxItems: 2
- requestTypeId: rt_fixed_internet_with_hardware_order
  canonicalName: fixed_internet_hardware_order
  title: Objednávka pevného internetu s hardwarem
  description: Objednávka jedné hlavní pevné internetové služby s doplňkovým hardwarem nebo instalačním add-onem.
  dto:
    rootClassName: FixedInternetHardwareOrderRequestDto
    fields:
    - customerStatus
    - customerName
    - contactPhone
    - contactEmail
    - installationAddress
    - requestedServices
    - requestedProducts
    - contractTermMonths
  completeness:
    requiredFields:
    - customerStatus
    - customerName
    - contactPhone
    - installationAddress
    - requestedServices
    - requestedProducts
    - contractTermMonths
    conditionalRequiredFields: []
  fieldDomainScope:
    requestedServices.serviceId:
      allowedServiceIds:
      - svc_internet_fiber_300
      - svc_internet_fiber_1000
      - svc_internet_dsl_100
      - svc_internet_wireless_50
    requestedProducts.productId:
      allowedProductIds:
      - prod_router_standard
      - prod_router_pro
      - prod_mesh_node
      - prod_installation_express
  collectionFieldConstraints:
    requestedServices:
      minItems: 1
      maxItems: 1
    requestedProducts:
      minItems: 1
- requestTypeId: rt_internet_tv_bundle_order
  canonicalName: internet_tv_bundle_order
  title: Objednávka balíčku internet + televize
  description: Kombinovaná objednávka jedné pevné internetové služby a jedné televizní služby, volitelně s TV doplňky a bundle slevou.
  dto:
    rootClassName: InternetTvBundleOrderRequestDto
    fields:
    - customerStatus
    - customerName
    - contactPhone
    - contactEmail
    - installationAddress
    - requestedServices
    - requestedProducts
    - contractTermMonths
    - requestedDiscounts
  completeness:
    requiredFields:
    - customerStatus
    - customerName
    - contactPhone
    - installationAddress
    - requestedServices
    - contractTermMonths
    conditionalRequiredFields: []
  fieldDomainScope:
    requestedServices.serviceId:
      allowedServiceIds:
      - svc_internet_fiber_300
      - svc_internet_fiber_1000
      - svc_internet_dsl_100
      - svc_internet_wireless_50
      - svc_tv_basic
      - svc_tv_family
    requestedProducts.productId:
      allowedProductIds:
      - prod_set_top_box
      - prod_tv_sports_pack
      - prod_router_standard
      - prod_router_pro
    requestedDiscounts.discountId:
      allowedDiscountIds:
      - disc_bundle_10_new
  collectionFieldConstraints:
    requestedServices:
      minItems: 2
      maxItems: 2
    requestedProducts:
      minItems: 0
    requestedDiscounts:
      minItems: 0
      maxItems: 1
- requestTypeId: rt_retention_discount_request
  canonicalName: retention_discount_request
  title: Požadavek na retenční slevu
  description: Retenční jednání se stávajícím zákazníkem o konkrétní službě se žádostí o retenční slevu.
  dto:
    rootClassName: RetentionDiscountRequestDto
    fields:
    - customerStatus
    - customerName
    - contactPhone
    - retentionCase
    - currentServices
    - targetServiceId
    - requestedDiscounts
    - churnReason
    - competitorOffer
  completeness:
    requiredFields:
    - customerStatus
    - customerName
    - contactPhone
    - retentionCase
    - currentServices
    - targetServiceId
    - requestedDiscounts
    conditionalRequiredFields: []
  fieldDomainScope:
    currentServices.serviceId:
      allowedServiceIds:
      - svc_mobile_start_5g
      - svc_mobile_unlimited_5g
      - svc_mobile_family_plus
      - svc_internet_fiber_300
      - svc_internet_fiber_1000
      - svc_internet_dsl_100
      - svc_internet_wireless_50
      - svc_tv_basic
      - svc_tv_family
    targetServiceId:
      allowedServiceIds:
      - svc_mobile_start_5g
      - svc_mobile_unlimited_5g
      - svc_mobile_family_plus
      - svc_internet_fiber_300
      - svc_internet_fiber_1000
      - svc_internet_dsl_100
      - svc_internet_wireless_50
      - svc_tv_basic
      - svc_tv_family
    requestedDiscounts.discountId:
      allowedDiscountIds:
      - disc_retention_15_existing
  collectionFieldConstraints:
    currentServices:
      minItems: 1
    requestedDiscounts:
      minItems: 1
      maxItems: 1
