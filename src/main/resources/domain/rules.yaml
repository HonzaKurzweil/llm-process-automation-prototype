operator: FuturaTel CZ
catalogVersion: '1.0'
dependencyRules:
  - ruleId: dep_tv_basic_requires_fixed_internet
    sourceKind: service
    sourceId: svc_tv_basic
    requirementType: requires_category
    requiredCategories:
      - fixed_internet
    requiredIds: [ ]
    reason: TV služba se prodává jen společně s pevným internetem.
  - ruleId: dep_tv_family_requires_fixed_internet
    sourceKind: service
    sourceId: svc_tv_family
    requirementType: requires_category
    requiredCategories:
      - fixed_internet
    requiredIds: [ ]
    reason: Rozšířený TV balíček se prodává jen společně s pevným internetem.
  - ruleId: dep_set_top_box_requires_tv_service
    sourceKind: product
    sourceId: prod_set_top_box
    requirementType: requires_category
    requiredCategories:
      - tv
    requiredIds: [ ]
    reason: Set-top box lze objednat jen společně s televizní službou.
  - ruleId: dep_sports_pack_requires_tv_family
    sourceKind: product
    sourceId: prod_tv_sports_pack
    requirementType: requires_id
    requiredCategories: [ ]
    requiredIds:
      - svc_tv_family
    reason: Sportovní doplněk lze objednat jen k rozšířenému TV balíčku Family.
  - ruleId: dep_install_express_requires_fixed_internet
    sourceKind: product
    sourceId: prod_installation_express
    requirementType: requires_category
    requiredCategories:
      - fixed_internet
    requiredIds: [ ]
    reason: Expresní instalace je relevantní jen při zřízení pevného internetu.
  - ruleId: dep_router_standard_requires_fixed_internet
    sourceKind: product
    sourceId: prod_router_standard
    requirementType: requires_category
    requiredCategories:
      - fixed_internet
    requiredIds: [ ]
    reason: Router Standard lze pronajmout jen ke službě pevného internetu.
  - ruleId: dep_router_pro_requires_fixed_internet
    sourceKind: product
    sourceId: prod_router_pro
    requirementType: requires_category
    requiredCategories:
      - fixed_internet
    requiredIds: [ ]
    reason: Router Pro lze pronajmout jen ke službě pevného internetu.
  - ruleId: dep_mesh_requires_router_pro_or_fiber1000
    sourceKind: product
    sourceId: prod_mesh_node
    requirementType: requires_one_of_ids
    requiredCategories: [ ]
    requiredIds:
      - prod_router_pro
      - svc_internet_fiber_1000
    reason: Mesh jednotka dává smysl jen při výkonnějším domácím vybavení nebo nejvyšším optickém tarifu.
incompatibilityRules:
  - ruleId: inc_standard_vs_pro_router
    leftKind: product
    leftId: prod_router_standard
    rightKind: product
    rightId: prod_router_pro
    reason: Zákazník si má zvolit pouze jeden typ hlavního routeru.
  - ruleId: inc_fiber1000_vs_dsl100
    leftKind: service
    leftId: svc_internet_fiber_1000
    rightKind: service
    rightId: svc_internet_dsl_100
    reason: V jednom standardním rezidenčním leadu se nepředpokládá souběžná objednávka dvou hlavních pevných internetů pro stejnou instalaci.
  - ruleId: inc_fiber1000_vs_wireless50
    leftKind: service
    leftId: svc_internet_fiber_1000
    rightKind: service
    rightId: svc_internet_wireless_50
    reason: Alternativní přístupové technologie se v jednom běžném leadu nekombinují.
eligibilityRules:
  - ruleId: elg_family_tariff_requires_two_mobile_lines
    targetKind: service
    targetId: svc_mobile_family_plus
    conditionType: min_category_quantity
    condition:
      category: mobile
      minQuantity: 2
    reason: Rodinný tarif má smysl jen při alespoň dvou mobilních linkách.
  - ruleId: elg_bundle_discount_requires_two_categories
    targetKind: discount
    targetId: disc_bundle_10_new
    conditionType: min_distinct_service_categories
    condition:
      minDistinctServiceCategories: 2
    reason: Balíčková sleva vzniká až při kombinaci alespoň dvou různých kategorií služeb.
  - ruleId: elg_porting_discount_requires_porting
    targetKind: discount
    targetId: disc_porting_mobile_200
    conditionType: requires_flag
    condition:
      flag: portingRequested
      value: true
    reason: Sleva za přenos čísla je navázána na skutečný požadavek na portaci.
  - ruleId: elg_retention_discount_requires_existing_customer
    targetKind: discount
    targetId: disc_retention_15_existing
    conditionType: requires_customer_status
    condition:
      eligibleCustomerStatuses:
        - existing
      retentionCaseRequired: true
    reason: Retenční sleva je určena jen pro jednání se stávajícím zákazníkem.
  - ruleId: elg_family_line_discount_requires_family_tariff_and_two_lines
    targetKind: discount
    targetId: disc_family_line_100
    conditionType: composite
    condition:
      requiredServiceIds:
        - svc_mobile_family_plus
      category: mobile
      minQuantity: 2
    reason: Sleva na další linky je určena jen pro rodinnou mobilní kombinaci.
  - ruleId: elg_express_install_discount_requires_mobile_and_fixed_internet
    targetKind: discount
    targetId: disc_install_express_waiver
    conditionType: composite
    condition:
      requiredCategories:
        - mobile
        - fixed_internet
      minDistinctServiceCategories: 2
    reason: Akce na expresní instalaci zdarma se poskytuje jen při kombinaci internetu a mobilu.
quantityRules:
  - ruleId: qty_max_one_fixed_internet_core
    targetKind: service
    targetScope: category
    targetId: fixed_internet
    maxQuantity: 1
    reason: Pro zjednodušený rezidenční use case uvažujeme jednu hlavní pevnou internetovou službu na lead.
  - ruleId: qty_max_mesh_nodes_three
    targetKind: product
    targetScope: id
    targetId: prod_mesh_node
    maxQuantity: 3
    reason: V běžné domácnosti dává smysl nejvýše trojice mesh jednotek.
  - ruleId: qty_max_set_top_box_three
    targetKind: product
    targetScope: id
    targetId: prod_set_top_box
    maxQuantity: 3
    reason: Zjednodušený limit pro domácnost s více televizemi.
discountExclusionRules:
  - ruleId: dex_core_service_monthly_promos_mutually_exclusive
    exclusivityGroup: core_service_monthly_promo
    reason: Hlavní měsíční promo na služby se nesmí kombinovat s jiným hlavním měsíčním promem.
