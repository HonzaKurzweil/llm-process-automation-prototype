  - requestTypeId: rt_retention_discount_request
    dtoClassName: RetentionDiscountRequestDto
    title: Požadavek na retenční slevu
    description: Retenční jednání se stávajícím zákazníkem o konkrétní službě se žádostí o retenční slevu.
    fields:
      - path: customerStatus
        javaType: CustomerStatus
        meaning: Status zákazníka vůči operátorovi.
        allowedValues:
          - new
          - existing
      - path: customerName
        javaType: String
        meaning: Jméno a příjmení zákazníka nebo kontaktní osoby.
      - path: contactPhone
        javaType: String
        meaning: Primární kontaktní telefon pro zpracování požadavku.
      - path: retentionCase
        javaType: Boolean
        meaning: Indikátor, že jde o retenční jednání.
      - path: currentServices
        javaType: List<CurrentServiceRefDto>
        meaning: Služby, které zákazník aktuálně využívá.
        componentType: currentServiceRef
      - path: targetServiceId
        javaType: String
        meaning: Služba, ke které se retenční požadavek vztahuje.
      - path: requestedDiscounts
        javaType: List<DiscountSelectionDto>
        meaning: Slevy explicitně požadované nebo zmíněné ve vstupu.
        componentType: discountSelection
      - path: churnReason
        javaType: String
        meaning: Důvod zvažovaného odchodu nebo žádosti o lepší podmínky.
      - path: competitorOffer
