- requestTypeId: rt_retention_discount_request
  dtoClassName: RetentionDiscountRequestDto
  promptDirectory: read_prompts/extraction/rt_retention_discount_request
  title: Požadavek na retenční slevu
  description: Retenční jednání se stávajícím zákazníkem o konkrétní službě se žádostí
    o retenční slevu.
  fields:
  - path: customerStatus
    javaType: CustomerStatus
    meaning: Status zákazníka vůči operátorovi.
    requiredForComplete: true
    allowedValues: *id001
  - path: customerName
    javaType: String
    meaning: Jméno a příjmení zákazníka nebo kontaktní osoby.
    requiredForComplete: true
  - path: contactPhone
    javaType: String
    meaning: Primární kontaktní telefon pro zpracování požadavku.
    requiredForComplete: true
  - path: retentionCase
    javaType: Boolean
    meaning: Indikátor, že jde o retenční jednání.
    requiredForComplete: true
  - path: currentServices
    javaType: List<CurrentServiceRefDto>
    meaning: Služby, které zákazník aktuálně využívá.
    requiredForComplete: true
    componentType: currentServiceRef
  - path: targetServiceId
    javaType: String
    meaning: Služba, ke které se retenční požadavek vztahuje.
    requiredForComplete: true
  - path: requestedDiscounts
    javaType: List<DiscountSelectionDto>
    meaning: Slevy explicitně požadované nebo zmíněné ve vstupu.
    requiredForComplete: true
    componentType: discountSelection
  - path: churnReason
    javaType: String
    meaning: Důvod zvažovaného odchodu nebo žádosti o lepší podmínky.
    requiredForComplete: false
  - path: competitorOffer
    javaType: String
    meaning: Konkurenční nabídka zmíněná v retenčním kontextu.
    requiredForComplete: false
  completeRequiredFields:
  - customerStatus
  - customerName
  - contactPhone
  - retentionCase
  - currentServices
  - targetServiceId
  - requestedDiscounts
  conditionalRequiredFields: []
  fieldConstraints:
  - path: currentServices.serviceId
    allowedServiceIds:
    - svc_mobile_start_5g
    - svc_mobile_unlimited_5g
    - svc_mobile_family_plus
    - svc_internet_fiber_300
    - svc_internet_fiber_1000
    - svc_internet_dsl_100
    - svc_internet_wireless_50
    - svc_tv_basic
    - svc_tv_family
  - path: targetServiceId
    allowedServiceIds:
    - svc_mobile_start_5g
    - svc_mobile_unlimited_5g
    - svc_mobile_family_plus
    - svc_internet_fiber_300
    - svc_internet_fiber_1000
    - svc_internet_dsl_100
    - svc_internet_wireless_50
    - svc_tv_basic
    - svc_tv_family
  - path: requestedDiscounts.discountId
    allowedDiscountIds:
    - disc_retention_15_existing
  - path: currentServices
    minItems: 1
  - path: requestedDiscounts
    minItems: 1
    maxItems: 1
  scenarioTemplates:
  - templateId: retention_fixed_internet
    description: Stávající zákazník chce retenční slevu na pevný internet.
    fixedValues:
      customerStatus: existing
      retentionCase: true
      currentServices:
      - serviceId: svc_internet_fiber_300
      targetServiceId: svc_internet_fiber_300
      requestedDiscounts:
      - discountId: disc_retention_15_existing
    generatedFields:
    - churnReason
    - competitorOffer
  - templateId: retention_mobile
    description: Stávající zákazník vyjednává retenční slevu na mobilní tarif.
    fixedValues:
      customerStatus: existing
      retentionCase: true
      currentServices:
      - serviceId: svc_mobile_unlimited_5g
      targetServiceId: svc_mobile_unlimited_5g
      requestedDiscounts:
      - discountId: disc_retention_15_existing
    generatedFields:
    - churnReason
    - competitorOffer
  generationSources:
    customerName: entityPools.customerProfiles.customerName
    contactPhone: entityPools.customerProfiles.contactPhone
    contactEmail: entityPools.customerProfiles.contactEmail
    churnReason: entityPools.churnReasons
    competitorOffer: entityPools.competitorOffers
