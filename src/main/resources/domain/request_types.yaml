        meaning: Jméno a příjmení zákazníka nebo kontaktní osoby.
      - path: contactPhone
        javaType: String
        meaning: Primární kontaktní telefon pro zpracování požadavku.
      - path: contactEmail
        javaType: String
        meaning: Kontaktní e-mail, pokud je ve vstupu uveden.
      - path: installationAddress
        javaType: String
        meaning: Instalační adresa pro pevný internet nebo domácí služby.
      - path: requestedServices
        javaType: List<ServiceSelectionDto>
        meaning: Hlavní služby, které zákazník požaduje objednat.
        componentType: serviceSelection
      - path: requestedProducts
        javaType: List<ProductSelectionDto>
        meaning: Doplňkové produkty nebo add-ony uvedené v požadavku.
        componentType: productSelection
      - path: contractTermMonths
        javaType: Integer
        meaning: Požadovaná délka závazku v měsících.
        allowedValues:
          - 0
          - 24
    fieldConstraints:
      - path: requestedServices.serviceId
        allowedServiceIds:
          - svc_internet_fiber_300
          - svc_internet_fiber_1000
          - svc_internet_dsl_100
          - svc_internet_wireless_50
      - path: requestedProducts.productId
        allowedProductIds:
          - prod_router_standard
          - prod_router_pro
          - prod_mesh_node
          - prod_installation_express
      - path: requestedServices
        minItems: 1
        maxItems: 1
      - path: requestedProducts
        minItems: 1
  - requestTypeId: rt_internet_tv_bundle_order
