request_types:
  - request_type_id: rt_new_mobile_order
    title: Nová objednávka mobilní služby
    description: Jedna samostatná mobilní služba pro nového nebo stávajícího zákazníka, volitelně s portací čísla.
    required_fields:
      - customer_status
      - customer_name
      - contact_phone
      - requested_services
      - contract_term_months
      - porting_requested
    conditional_required_fields:
      - when: porting_requested == true
        fields:
          - ported_numbers
    optional_fields:
      - contact_email
      - requested_discounts
      - notes
    allowed_service_ids:
      - svc_mobile_start_5g
      - svc_mobile_unlimited_5g
    allowed_product_ids: []
    allowed_discount_ids:
      - disc_porting_mobile_200

  - request_type_id: rt_family_mobile_order
    title: Rodinná mobilní objednávka
    description: Objednávka rodinného mobilního tarifu s více linkami.
    required_fields:
      - customer_status
      - customer_name
      - contact_phone
      - requested_services
      - mobile_lines_count
      - mobile_lines
      - contract_term_months
    conditional_required_fields:
      - when: any mobile_lines[].porting_requested == true
        fields:
          - ported_numbers
    optional_fields:
      - contact_email
      - requested_discounts
      - notes
    allowed_service_ids:
      - svc_mobile_family_plus
    allowed_product_ids: []
    allowed_discount_ids:
      - disc_family_line_100
      - disc_porting_mobile_200

  - request_type_id: rt_fixed_internet_with_hardware_order
    title: Objednávka pevného internetu s hardwarem
    description: Objednávka jedné hlavní pevné internetové služby včetně routeru, mesh nebo instalačního add-onu.
    required_fields:
      - customer_status
      - customer_name
      - contact_phone
      - installation_address
      - requested_services
      - requested_products
      - contract_term_months
    conditional_required_fields: []
    optional_fields:
      - contact_email
      - requested_discounts
      - notes
    allowed_service_ids:
      - svc_internet_fiber_300
      - svc_internet_fiber_1000
      - svc_internet_dsl_100
      - svc_internet_wireless_50
    allowed_product_ids:
      - prod_router_standard
      - prod_router_pro
      - prod_mesh_node
      - prod_installation_express
    allowed_discount_ids: []

  - request_type_id: rt_internet_tv_bundle_order
    title: Objednávka balíčku internet + televize
    description: Kombinovaná objednávka pevného internetu a televizní služby, volitelně s TV doplňky a bundle slevou.
    required_fields:
      - customer_status
      - customer_name
      - contact_phone
      - installation_address
      - requested_services
      - contract_term_months
    conditional_required_fields:
      - when: requested_products contains prod_tv_sports_pack
        fields:
          - requested_services
    optional_fields:
      - requested_products
      - requested_discounts
      - contact_email
      - notes
    allowed_service_ids:
      - svc_internet_fiber_300
      - svc_internet_fiber_1000
      - svc_internet_dsl_100
      - svc_internet_wireless_50
      - svc_tv_basic
      - svc_tv_family
    allowed_product_ids:
      - prod_set_top_box
      - prod_tv_sports_pack
      - prod_router_standard
      - prod_router_pro
    allowed_discount_ids:
      - disc_bundle_10_new

  - request_type_id: rt_retention_discount_request
    title: Požadavek na retenční slevu
    description: Jednání se stávajícím zákazníkem o zachování nebo úpravě služby se žádostí o retenční slevu.
    required_fields:
      - customer_status
      - customer_name
      - contact_phone
      - retention_case
      - current_services
      - target_service_id
      - requested_discounts
    conditional_required_fields: []
    optional_fields:
      - churn_reason
      - competitor_offer
      - notes
    allowed_service_ids:
      - svc_mobile_start_5g
      - svc_mobile_unlimited_5g
      - svc_mobile_family_plus
      - svc_internet_fiber_300
      - svc_internet_fiber_1000
      - svc_internet_dsl_100
      - svc_internet_wireless_50
      - svc_tv_basic
      - svc_tv_family
    allowed_product_ids: []
    allowed_discount_ids:
      - disc_retention_15_existing