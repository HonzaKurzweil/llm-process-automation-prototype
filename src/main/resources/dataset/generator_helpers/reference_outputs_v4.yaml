      unclassifiableReasonId: null
    composition:
      knownComponents:
        - requestTypeId: rt_new_mobile_order
          referenceId: ref_new_mobile_order_02
          role: primary
          mustSurfacePaths:
            - requestedServices[0].serviceId
            - portingRequested
            - portedNumbers[0].number
