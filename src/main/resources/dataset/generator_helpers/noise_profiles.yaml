version: 2.0-lean-camelCase
purpose: Jednodušší noise model pro generování textových variant bez odděleného channelStyle.
channels:
- channel: crm_ticket
  description: Krátký interní ticket, často polostrukturovaný a heslovitý.
- channel: broker_email
  description: Souvislý e-mail od obchodníka nebo partnera.
- channel: call_transcript
  description: Přepis hovoru s mluveným jazykem, opravami a váháním.
noiseProfiles:
- noiseProfile: clean
  description: Bez šumu, pouze přirozený styl kanálu.
  maxNoiseTags: 0
- noiseProfile: light
  description: 1 až 2 lehké rušivé prvky bez změny základního významu.
  maxNoiseTags: 2
- noiseProfile: medium
  description: 2 až 3 rušivé prvky, včetně částečné neúplnosti nebo nejasnosti.
  maxNoiseTags: 3
noiseTags:
- noiseTag: shorthandInternal
  appliesTo:
  - crm_ticket
  effect: surfaceOnly
  description: Interní zkratky a heslovité zápisy.
- noiseTag: greetingSignatureNoise
  appliesTo:
  - broker_email
  effect: surfaceOnly
  description: Oslovení, podpis a kontaktní blok.
- noiseTag: hesitationDisfluency
  appliesTo:
  - call_transcript
  effect: surfaceOnly
  description: Ehm, no, vlastně a další váhání.
- noiseTag: smalltalkNoise
  appliesTo:
  - call_transcript
  effect: surfaceOnly
  description: Krátká nesouvisející zdvořilostní výměna.
- noiseTag: irrelevantInfo
  appliesTo:
  - crm_ticket
  - broker_email
  - call_transcript
  effect: surfaceOnly
  description: Vedlejší poznámka, která nemění očekávaný výstup.
- noiseTag: partialOmission
  appliesTo:
  - crm_ticket
  - broker_email
  - call_transcript
  effect: reducesCompleteness
  description: Některé požadované údaje nejsou ve vstupu explicitně řečeny.
- noiseTag: ambiguousWording
  appliesTo:
  - crm_ticket
  - broker_email
  - call_transcript
  effect: classificationDifficulty
  description: Nejednoznačné vyjádření zvyšující obtížnost klasifikace.
- noiseTag: unknownTailSnippet
  appliesTo:
  - broker_email
  - call_transcript
  - crm_ticket
  effect: classificationDifficulty
  description: Přidaný mimo-scope požadavek pro unclassifiable scénáře.
