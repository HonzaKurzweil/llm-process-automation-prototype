version: 3.1-camelCase
purpose: Taxonomie klasifikačních výsledků pro dataset generation a audit, sladěná s Java enumem RequestType, který vrací právě jeden známý request type nebo hodnotu UNCLASSIFIABLE.
runtimeAlignment:
  javaEnumClassName: RequestType
  resolutionMethod: RequestType.fromRequestTypeIdReference(String)
  returnsSingleValueOnly: true
  knownRequestTypes:
  - requestTypeIdReference: rt_new_mobile_order
    javaEnumConstant: RT_NEW_MOBILE_ORDER
  - requestTypeIdReference: rt_family_mobile_order
    javaEnumConstant: RT_FAMILY_MOBILE_ORDER
  - requestTypeIdReference: rt_fixed_internet_with_hardware_order
    javaEnumConstant: RT_FIXED_INTERNET_WITH_HARDWARE_ORDER
  - requestTypeIdReference: rt_internet_tv_bundle_order
    javaEnumConstant: RT_INTERNET_TV_BUNDLE_ORDER
  - requestTypeIdReference: rt_retention_discount_request
    javaEnumConstant: RT_RETENTION_DISCOUNT_REQUEST
  fallback:
    requestTypeIdReference: unclassifiable
    javaEnumConstant: UNCLASSIFIABLE
classificationPolicy:
  positiveClassificationRequiresExactlyOneKnownRequestType: true
  multipleKnownRequestTypesPresentResult: unclassifiable
  knownRequestTypeWithUnknownTailResult: unclassifiable
  unknownOrOutOfScopeResult: unclassifiable
  ambiguousOrInsufficientSignalResult: unclassifiable
datasetResultContract:
  expectedRequestTypeIdReference:
    description: Očekávaný výsledek klasifikační služby. Musí odpovídat hodnotě RequestType.requestTypeIdReference.
    allowedValues:
    - rt_new_mobile_order
    - rt_family_mobile_order
    - rt_fixed_internet_with_hardware_order
    - rt_internet_tv_bundle_order
    - rt_retention_discount_request
    - unclassifiable
  unclassifiableReasonId:
    description: Doplňkové metadata pro generování datasetu a audit. Vyplňuje se pouze tehdy, když expected_request_type_id_reference = unclassifiable. Nejde o samostatný runtime návratový typ klasifikační služby.
    allowedValues:
    - multiple_known_request_types_present
    - known_request_type_with_unknown_tail
    - unknown_or_out_of_scope
    - ambiguous_or_insufficient_signal
scenarioGroups:
- scenarioType: single_known_request_type
  description: Vstup obsahuje právě jeden známý request type a nic dalšího, co by měnilo rozhodnutí.
  expectedRequestTypeIdReference: <one_known_request_type_id_reference>
  unclassifiableReasonId: null
- scenarioType: known_request_type_with_unknown_tail
  description: Vstup obsahuje jeden známý request type a navíc další mimo-scope intent; výsledek má být UNCLASSIFIABLE.
  expectedRequestTypeIdReference: unclassifiable
  unclassifiableReasonId: known_request_type_with_unknown_tail
- scenarioType: multiple_known_request_types_present
  description: Vstup obsahuje více samostatných známých request types; výsledek má být UNCLASSIFIABLE.
  expectedRequestTypeIdReference: unclassifiable
  unclassifiableReasonId: multiple_known_request_types_present
- scenarioType: unknown_or_out_of_scope
  description: Vstup neodpovídá žádnému známému request type.
  expectedRequestTypeIdReference: unclassifiable
  unclassifiableReasonId: unknown_or_out_of_scope
- scenarioType: ambiguous_or_insufficient_signal
  description: Vstup je příliš vágní nebo rozporný pro bezpečné přiřazení jednoho známého request type.
  expectedRequestTypeIdReference: unclassifiable
  unclassifiableReasonId: ambiguous_or_insufficient_signal
unclassifiableReasonCatalog:
- unclassifiableReasonId: multiple_known_request_types_present
  description: Ve vstupu je současně přítomno více známých request types, takže nelze vrátit jediný RequestType.
  examples:
  - Jedna zpráva obsahuje zároveň novou mobilní objednávku a objednávku pevného internetu.
  - Jeden e-mail kombinuje retenční požadavek a samostatný bundle lead.
- unclassifiableReasonId: known_request_type_with_unknown_tail
  description: Ve vstupu je rozpoznatelný jeden známý request type, ale zároveň i další intent mimo definovaný scope.
  examples:
  - Rozpoznatelná objednávka internetu doplněná o požadavek na zaslání duplikátu staré faktury.
  - Retenční požadavek doplněný o technickou reklamaci mimo scope.
- unclassifiableReasonId: unknown_or_out_of_scope
  description: Vstup se týká telekomunikační oblasti, ale neodpovídá žádnému známému request type.
  examples:
  - Reklamace roamingového vyúčtování.
  - Žádost o PUK nebo výměnu SIM/eSIM.
- unclassifiableReasonId: ambiguous_or_insufficient_signal
  description: Vstup obsahuje příliš málo informací nebo rozporné signály pro bezpečné přiřazení jednoho RequestType.
  examples:
  - Obecná poznámka o nabídce internetu nebo televize bez konkrétní akce.
  - Krátká prosba o zavolání zpět kvůli slevě bez dalšího kontextu.
